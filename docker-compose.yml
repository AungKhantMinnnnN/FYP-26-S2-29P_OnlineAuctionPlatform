services:

  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: auction-postgres:local
    container_name: auction_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"       # exposed for API gateway, bidding engine and recommendation engine connection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    image: auction-redis:local
    container_name: auction_redis
    env_file: .env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"       # exposed for transmitting data for bidding engine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-init:
    image: redis:7-alpine
    container_name: auction_redis_init
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./docker/redis/init-redis.sh:/init-redis.sh
    entrypoint: /bin/sh /init-redis.sh
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: auction_minio
    env_file: .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"       # S3 API — exposed for API Gateway to save images
      - "9001:9001"       # MinIO web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: auction_minio_init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init-buckets.sh:/init-buckets.sh
    entrypoint: /bin/sh /init-buckets.sh
    restart: "no"

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: auction-nginx:local
    container_name: auction_nginx
    ports:
      - "80:80"           # all browser traffic enters here
    depends_on:
      - bidding-engine
      - recommendation-engine
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets nginx reach your local FastAPI
    restart: unless-stopped

  # ── Microservices ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: auction-backend:local
    container_name: auction_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LOG_DIR: /logs
    ports:
      - "8000:8000"
    volumes:
      - ./logs/backend:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bidding-engine:
    build:
      context: ./bidding-engine
      dockerfile: Dockerfile
    image: auction-bidding-engine:local
    container_name: auction_bidding_engine
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LOG_DIR: /logs
    ports:
      - "8001:8001"       # health check + WebSocket
    volumes:
      - bidding_engine_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-init:
        condition: service_completed_successfully
    restart: unless-stopped

  recommendation-engine:
    build:
      context: ./recommendation-engine
      dockerfile: Dockerfile
    image: auction-recommendation-engine:local
    container_name: auction_recommendation_engine
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LOG_DIR: /logs
    ports:
      - "8002:8002"       # health check endpoint
    volumes:
      - recommendation_engine_logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  bidding_engine_logs:
  recommendation_engine_logs: