upstream backend {
    server backend:8000;
}

upstream bidding_engine {
    server bidding-engine:8001;
}

upstream recommendation_engine {
    server recommendation-engine:8002;
}

upstream minio {
    server minio:9000;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Bidding Engine WebSocket (must come before the /v1.0.0/bids/ REST block below —
    # nginx matches the longest prefix, so this wins for ws upgrade requests)
    location /v1.0.0/bids/ws/ {
        proxy_pass http://bidding_engine;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Bidding Engine REST & Swagger Docs
    location /v1.0.0/bids/ {
        proxy_pass http://bidding_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend Core & Swagger Docs
    location /v1.0.0/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Recommendation Engine REST & Swagger Docs
    location /v1.0.0/recs/ {
        proxy_pass http://recommendation_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Also route /trending specifically to Recommendation Engine
    location /v1.0.0/trending {
        proxy_pass http://recommendation_engine/v1.0.0/recs/trending;
        proxy_set_header Host $host;
    }

    # Listing images — MinIO isn't published on the host anymore, proxy it instead
    location /auction-assets/ {
        proxy_pass http://minio/auction-assets/;
    }

    # User avatars — same reasoning as auction-assets above
    location /auction-avatars/ {
        proxy_pass http://minio/auction-avatars/;
    }

    location /health {
        return 200 '{"status":"UP"}';
        add_header Content-Type application/json;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
