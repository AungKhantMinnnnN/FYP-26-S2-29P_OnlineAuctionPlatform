version: '3.8'

services:
  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - bidding-engine
      - recommendation-engine
    networks:
      - auction-network
    restart: always

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${BACKEND_DATABASE_URL}
      - REDIS_URL=${BACKEND_REDIS_URL}
      - SECRET_KEY=${BACKEND_SECRET_KEY}
      - ALGORITHM=${BACKEND_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${BACKEND_ACCESS_TOKEN_EXPIRE_MINUTES}
    depends_on:
      - db
      - redis
    networks:
      - auction-network
    restart: always

  bidding-engine:
    build:
      context: ./bidding-engine
    environment:
      - REDIS_URL=${BIDDING_REDIS_URL}
      - BACKEND_URL=${BIDDING_BACKEND_URL}
      - SECRET_KEY=${BIDDING_SECRET_KEY}
    depends_on:
      - redis
    networks:
      - auction-network
    restart: always

  recommendation-engine:
    build:
      context: ./recommendation-engine
    environment:
      - REDIS_URL=${REC_REDIS_URL}
      - BACKEND_URL=${REC_BACKEND_URL}
    networks:
      - auction-network
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - auction-network
    restart: always

  redis:
    image: redis:7-alpine
    networks:
      - auction-network
    restart: always

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - auction-network
    restart: always

networks:
  auction-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
