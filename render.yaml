services:
  # API Gateway
  - type: web
    name: auction-api-gateway
    env: docker
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Bidding Engine
  - type: web
    name: auction-bidding-engine
    env: docker
    rootDir: ./bidding-engine
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # Recommendation Engine
  - type: web
    name: auction-recommendation-engine
    env: docker
    rootDir: ./recommendation-engine
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
